<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - My Drive</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@300..700&display=swap');

        body {
            background-color: #F5F5DC;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: quicksand, sans-serif;
            overflow: hidden;
            position: relative;
        }
        
        /* Background decoration */
        .bg-decoration {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.7;
            z-index: -1;
        }
        
        .bg-circle-1 {
            width: 400px;
            height: 400px;
            background: linear-gradient(135deg, #8C6A5E, #D2B48C);
            top: -150px;
            left: -150px;
        }
        
        .bg-circle-2 {
            width: 350px;
            height: 350px;
            background: linear-gradient(135deg, #A0826D, #DEB887);
            bottom: -100px;
            right: -100px;
        }
        
        .bg-circle-3 {
            width: 300px;
            height: 300px;
            background: linear-gradient(135deg, #BC9A6A, #F5DEB3);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }
        
        .glass-card {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }
        
        .glass-input {
            background: rgba(255, 255, 255, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px;
        }
        
        .glass-input:focus {
            outline: none;
            border-color: #8C6A5E;
            background: rgba(255, 255, 255, 0.5);
        }
        
        .glass-button {
            background-color: #8C6A5E;
            color: white;
            border-radius: 12px;
            transition: all 0.3s ease;
        }
        
        .glass-button:hover {
            background-color: #7a5a4e;
            transform: translateY(-2px);
        }
    </style>
</head>
<body class="p-4">
    <!-- Background decoration elements -->
    <div class="bg-decoration bg-circle-1"></div>
    <div class="bg-decoration bg-circle-2"></div>
    <div class="bg-decoration bg-circle-3"></div>
    
    <div class="container max-w-md mx-auto font-medium">
        <div class="glass-card p-8">
            <h2 class="text-2xl font-bold text-center mb-6 text-[#8C6A5E]">Daftar Akun Baru</h2>
            <form id="registerForm">
                <div class="mb-4">
                    <input 
                        type="text" 
                        id="username" 
                        placeholder="Username" 
                        class="glass-input w-full p-3 mb-4 text-gray-800 placeholder-gray-600 bg-[#ffff]"
                        required>
                </div>
                <div class="mb-4">
                    <input 
                        type="password" 
                        id="password" 
                        placeholder="Password" 
                        class="glass-input w-full p-3 mb-4 text-gray-800 placeholder-gray-600 bg-[#ffff]"
                        required>
                </div>
                <button 
                    type="submit" 
                    class="glass-button w-full p-3 font-medium">
                    Daftar
                </button>
            </form>
            <p class="text-center mt-6 text-gray-700">
                Sudah punya akun? 
                <a href="login.html" class="text-[#8C6A5E] font-medium hover:underline">Masuk di sini</a>
            </p>
        </div>
    </div>
    <script src="/js/script.js"></script>
</body>
</html>
